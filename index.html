<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尋找您的專屬頭皮護理方式 | MUJI</title>
    <style>
        :root {
            --muji-red: #7f0019;
            --muji-gray: #333333;
            --muji-light-gray: #f6f6f6;
            --muji-border: #e0e0e0;
            --bg-color: #ffffff;
        }

        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--muji-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #quiz-container {
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
            text-align: center;
        }

        .step { display: none; animation: fadeIn 0.4s ease-out; }
        .step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 20px; letter-spacing: 1px; }
        p.description { font-size: 0.9rem; color: #666; margin-bottom: 30px; }

        .option-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            background: white;
            border: 1px solid var(--muji-border);
            border-radius: 2px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            line-height: 1.4;
        }
        .option-btn:hover { background-color: var(--muji-light-gray); border-color: #999; }

        /* 結果頁樣式優化 */
        .result-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 25px;
        }

        .result-item {
            display: flex;
            align-items: center;
            background-color: var(--muji-light-gray);
            padding: 15px;
            border-radius: 4px;
            text-align: left;
        }

        .result-img {
            width: 100px;
            height: 100px;
            background-color: #fff;
            margin-right: 20px;
            border-radius: 2px;
            object-fit: contain; /* 確保商品圖不被裁切 */
            flex-shrink: 0;
            border: 1px solid #eee;
        }

        .result-info { flex-grow: 1; }
        .label { display: block; font-size: 0.75rem; color: var(--muji-red); font-weight: bold; margin-bottom: 5px; }
        .product-name { font-size: 0.95rem; font-weight: 500; color: #000; line-height: 1.4; }
        
        .restart-btn {
            margin-top: 40px;
            background: none;
            border: none;
            text-decoration: underline;
            color: #999;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="step-0" class="step active">
        <h1 style="margin-top: 40px;">尋找您的專屬頭皮護理方式</h1>
        <p class="description">頭皮的健康決定髮絲的光澤。<br>兩步驟快速測算最適合您的護理組合。</p>
        <button class="option-btn" style="text-align:center; background:var(--muji-gray); color:white;" onclick="nextStep(1)">開始體驗</button>
    </div>

    <div id="step-1" class="step">
        <span style="font-size: 0.8rem; color: #bbb;">STEP 01</span>
        <h1>基礎養護需求</h1>
        <p class="description">關於每天的洗髮時光，您的頭皮狀態更傾向？</p>
        <button class="option-btn" onclick="record(1, '植物發酵液頭皮護理洗髮精'); nextStep(2)">
            <strong>深層淨化</strong><br><small style="color:#888;">解決頭皮悶熱感，追求毛孔清爽呼吸。</small>
        </button>
        <button class="option-btn" onclick="record(1, '植物發酵液頭皮護理潤絲精'); nextStep(2)">
            <strong>滋潤修護</strong><br><small style="color:#888;">改善洗後乾澀，鎖住頭皮與髮絲水分。</small>
        </button>
        <button class="option-btn" onclick="record(1, '植物發酵液 洗 + 潤組合'); nextStep(2)">
            <strong>全方位平衡</strong><br><small style="color:#888;">完整調理頭皮微生態，潔淨同時補水。</small>
        </button>
    </div>

    <div id="step-2" class="step">
        <span style="font-size: 0.8rem; color: #bbb;">STEP 02</span>
        <h1>日常生活對策</h1>
        <p class="description">洗髮之後，哪項髮質或細節困擾最常困擾您？</p>
        <button class="option-btn" onclick="record(2, '頭皮護理噴霧'); showResult()">頭皮容易乾燥、有癢感</button>
        <button class="option-btn" onclick="record(2, '免沖洗護髮乳/彈潤豐盈'); showResult()">髮根細軟扁塌，追求蓬鬆感</button>
        <button class="option-btn" onclick="record(2, '護髮精華/潤澤保濕'); showResult()">髮尾受損分岔嚴重</button>
        <button class="option-btn" onclick="record(2, '護髮噴霧/清爽柔順'); showResult()">追求快速順滑，改善糾結</button>
    </div>

    <div id="step-result" class="step">
        <h1>您的專屬護理組合</h1>
        <div class="result-card">
            <div class="result-item">
                <img id="img-res-1" class="result-img" src="" alt="商品圖">
                <div class="result-info">
                    <span class="label">核心基礎保養</span>
                    <span class="product-name" id="res-1"></span>
                </div>
            </div>
            <div class="result-item">
                <img id="img-res-2" class="result-img" src="" alt="商品圖">
                <div class="result-info">
                    <span class="label">機能進階對策</span>
                    <span class="product-name" id="res-2"></span>
                </div>
            </div>
        </div>
        <button class="restart-btn" onclick="location.reload()">重新檢測</button>
    </div>
</div>

<script>
    const itemImages = {
        '植物發酵液頭皮護理洗髮精': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11567044/0/639087467223230000?v=1',
        '植物發酵液頭皮護理潤絲精': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11567045/0/639087466910230000?v=1',
        '植物發酵液 洗 + 潤組合': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11567044/5/639087467223230000?v=1',
        '頭皮護理噴霧': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11069581/0/638981331186530000?v=1',
        '免沖洗護髮乳/彈潤豐盈': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11069579/0/639041876306400000?v=1',
        '護髮精華/潤澤保濕': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11069578/0/638980194893430000?v=1',
        '護髮噴霧/清爽柔順': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11069580/0/638980194892830000?v=1'
    };

    let selections = {};
    function nextStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-' + n).classList.add('active');
        window.scrollTo(0,0);
    }
    function record(s, v) { selections[s] = v; }
    function showResult() {
        document.getElementById('res-1').innerText = selections[1];
        document.getElementById('res-2').innerText = selections[2];
        document.getElementById('img-res-1').src = itemImages[selections[1]];
        document.getElementById('img-res-2').src = itemImages[selections[2]];
        
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-result').classList.add('active');
    }
</script>

</body>
</html>
