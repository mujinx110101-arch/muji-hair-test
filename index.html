<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋找您的專屬頭皮護理方式 | MUJI</title>
    <style>
        :root {
            --muji-red: #7f0019;
            --muji-gray: #333333;
            --muji-light-gray: #f6f6f6;
            --muji-border: #e0e0e0;
            --bg-color: #F2F1ED;
        }

        /* 🔒 核心：禁止捲動 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 禁止全網頁捲動 */
            background-color: var(--bg-color);
        }

        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: var(--muji-gray);
            display: flex;
            justify-content: center;
            align-items: center; /* 內容垂直置中 */
        }

        #quiz-container {
            width: 90%;
            max-width: 850px;
            height: 100vh; /* 鎖定容器高度為視窗高度 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 確保內容在畫面正中央 */
            box-sizing: border-box;
            position: relative;
        }

        #yt-player { position: absolute; width: 0; height: 0; pointer-events: none; opacity: 0; }

        /* --- 響應式佈局結構 --- */
        .intro-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .hero-img {
            width: 100%;
            max-width: 380px;
            height: auto;
            max-height: 30vh; /* 限制高度，確保下方按鈕不溢出 */
            object-fit: cover;
            border-radius: 2px;
        }

        .text-section {
            flex: 0; /* 不要過度擴張 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .step { display: none; animation: fadeIn 0.4s ease-out; width: 100%; }
        .step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1.3rem; font-weight: 500; margin: 5px 0 10px 0; letter-spacing: 1px; }
        p.description { font-size: 0.9rem; color: #666; margin-bottom: 20px; line-height: 1.5; }

        /* --- 按鈕容器 --- */
        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin: 10px 0;
            max-height: 60vh; /* 限制選項區域高度 */
        }

        .option-btn {
            display: flex;
            flex-direction: column;
            padding: 12px 18px; /* 縮小內距以節省高度 */
            background: white;
            border: 1px solid var(--muji-border);
            border-radius: 2px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            color: var(--muji-gray);
        }
        .option-btn:hover { background-color: var(--muji-light-gray); border-color: #999; }
        .option-btn strong { display: block; font-size: 0.95rem; color: #000; margin-bottom: 2px; }

        .back-btn {
            display: inline-block;
            background: none;
            border: none;
            color: #999;
            text-decoration: underline;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 10px;
        }

        /* --- 結果頁 --- */
        .result-card { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .result-item {
            display: flex; align-items: center; background-color: rgba(255,255,255,0.6);
            padding: 12px; border-radius: 4px; text-align: left; flex: 1;
        }
        .result-img { width: 70px; height: 70px; background-color: #fff; margin-right: 12px; object-fit: contain; flex-shrink: 0; }
        .product-name { font-size: 0.9rem; font-weight: 500; color: #000; }
        .label { display: block; font-size: 0.65rem; color: var(--muji-red); font-weight: bold; margin-bottom: 2px; }

        /* --- ⭐ iPad 橫向模式優化 (確保 100% 不溢出) --- */
        @media (min-width: 768px) and (orientation: landscape) {
            .intro-content { flex-direction: row; text-align: left; gap: 30px; }
            .hero-img { max-width: 40%; max-height: 50vh; }
            .options-container { grid-template-columns: 1fr 1fr; }
            .result-card { flex-direction: row; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="yt-player"></div>

<div id="quiz-container">
    <div id="step-0" class="step active">
        <div class="intro-content">
            <img src="https://img.91app.com/webapi/imagesV3/Original/SalePage/11567044/5/639087467223230000" class="hero-img">
            <div class="text-section">
                <h1>尋找您的專屬頭皮護理方式</h1>
                <p class="description">
                    特別添加 <strong>米糠、薏仁、大麥</strong> 發酵液成分。<br>
                    賦予頭皮潤澤，深層修補受損。<br>
                    只需三步驟，發現您的完美養護對策。
                </p>
                <button class="option-btn" style="text-align:center; background:var(--muji-gray); color:white; width: 200px; align-self: center;" onclick="startQuiz()">開始檢測</button>
            </div>
        </div>
    </div>

    <div id="step-1" class="step">
        <span style="font-size: 0.75rem; color: #bbb;">STEP 01 / 03</span>
        <h1>基礎養護需求</h1>
        <div class="options-container">
            <button class="option-btn" onclick="record(1, '植物發酵液頭皮護理洗髮精'); nextStep(2)"><strong>深層淨化清爽</strong>洗後帶走悶熱感，追求毛孔暢快。</button>
            <button class="option-btn" onclick="record(1, '植物發酵液頭皮護理潤絲精'); nextStep(2)"><strong>滋潤修護受損</strong>在洗髮同時呵護頭皮，鎖住水分。</button>
            <button class="option-btn" onclick="record(1, '植物發酵液 洗 + 潤組合'); nextStep(2)"><strong>全方位平衡</strong>三大發酵精華導入，達成微生態平衡。</button>
        </div>
        <button class="back-btn" onclick="nextStep(0)">返回首頁</button>
    </div>

    <div id="step-2" class="step">
        <span style="font-size: 0.75rem; color: #bbb;">STEP 02 / 03</span>
        <h1>生活環境觀察</h1>
        <div class="options-container">
            <button class="option-btn" onclick="nextStep(3)"><strong>空調房環境變化</strong>待在冷氣房久了，感覺頭皮乾燥緊繃。</button>
            <button class="option-btn" onclick="nextStep(3)"><strong>悶熱與壓力</strong>長時間配戴安全帽，容易有氣味或出油感。</button>
            <button class="option-btn" onclick="nextStep(3)"><strong>頻繁造型修整</strong>受染燙吹風傷害，髮尾顯得乾澀或分岔。</button>
        </div>
        <button class="back-btn" onclick="nextStep(1)">返回上一題</button>
    </div>

    <div id="step-3" class="step">
        <span style="font-size: 0.75rem; color: #bbb;">STEP 03 / 03</span>
        <h1>髮質特徵確認</h1>
        <div class="options-container">
            <button class="option-btn" onclick="record(2, '護髮精華/潤澤保濕'); showResult()"><strong>髮質乾燥毛躁</strong>觸感乾澀缺乏光澤，恢復柔順感。</button>
            <button class="option-btn" onclick="record(2, '免沖洗護髮乳/彈潤豐盈'); showResult()"><strong>自然捲毛躁粗硬</strong>髮絲亂翹難整理，追求輕盈服貼度。</button>
            <button class="option-btn" onclick="record(2, '護髮噴霧/清爽柔順'); showResult()"><strong>糾結細軟髮</strong>髮絲容易糾結，想要起床後快速順滑。</button>
            <button class="option-btn" onclick="record(2, '頭皮護理噴霧'); showResult()"><strong>容易扁塌氣味</strong>頭皮油水不平衡，維持清爽環境。</button>
        </div>
        <button class="back-btn" onclick="nextStep(2)">返回上一題</button>
    </div>

    <div id="step-result" class="step">
        <h1>您的專屬護理組合</h1>
        <div class="result-card">
            <div class="result-item"><img id="img-res-1" class="result-img" src=""><div class="result-info"><span class="label">Step 1</span><span class="product-name" id="res-1"></span></div></div>
            <div class="result-item"><img id="img-res-2" class="result-img" src=""><div class="result-info"><span class="label">Step 2</span><span class="product-name" id="res-2"></span></div></div>
        </div>
        <button class="back-btn" style="margin-top: 20px; font-size: 0.9rem;" onclick="resetQuiz()">重新檢測</button>
    </div>
</div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0',
            videoId: '2Lr11mJWrsE',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': '2Lr11mJWrsE', 'controls': 0 }
        });
    }

    function startQuiz() {
        if (player && player.playVideo) { player.playVideo(); }
        nextStep(1);
    }

    function resetQuiz() {
        selections = {};
        nextStep(0);
    }

    const itemImages = {
        '植物發酵液頭皮護理洗髮精': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11567044/0/639087467223230000?v=1',
        '植物發酵液頭皮護理潤絲精': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11567045/0/639087466910230000?v=1',
        '植物發酵液 洗 + 潤組合': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11567044/5/639087467223230000?v=1',
        '頭皮護理噴霧': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11069581/0/638981331186530000?v=1',
        '免沖洗護髮乳/彈潤豐盈': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11069579/0/639041876306400000?v=1',
        '護髮精華/潤澤保濕': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11069578/0/638980194893430000?v=1',
        '護髮噴霧/清爽柔順': 'https://img.91app.com/webapi/imagesV3/Original/SalePage/11069580/0/638980194892830000?v=1'
    };

    let selections = {};
    function nextStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('step-' + n);
        if (target) { target.classList.add('active'); }
    }
    function record(s, v) { selections[s] = v; }
    function showResult() {
        document.getElementById('res-1').innerText = selections[1] || "";
        document.getElementById('res-2').innerText = selections[2] || "";
        document.getElementById('img-res-1').src = itemImages[selections[1]] || "";
        document.getElementById('img-res-2').src = itemImages[selections[2]] || "";
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-result').classList.add('active');
    }
</script>
</body>
</html>
