<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尋找您的專屬頭皮護理方式 | MUJI</title>
    <style>
        :root {
            --muji-red: #7f0019;
            --muji-gray: #333333;
            --muji-light-gray: #f6f6f6;
            --muji-border: #e0e0e0;
            --bg-color: #ffffff;
        }

        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--muji-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #quiz-container {
            width: 100%;
            max-width: 450px;
            padding: 20px; /* 縮小間距以適應更多機型 */
            text-align: center;
            position: relative;
        }

        #yt-player { position: absolute; width: 0; height: 0; pointer-events: none; opacity: 0; }

        /* ⭐ 響應式圖片優化 */
        .hero-img {
            width: 100%;
            height: auto;
            max-height: 40vh;
            object-fit: cover;
            object-position: center;
            margin-bottom: 25px;
            border-radius: 2px;
            display: block;
        }

        .step { display: none; animation: fadeIn 0.4s ease-out; }
        .step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1.3rem; font-weight: 500; margin-bottom: 15px; letter-spacing: 1px; line-height: 1.4; }
        p.description { font-size: 0.9rem; color: #666; margin-bottom: 30px; line-height: 1.7; }

        .option-btn {
            display: block; width: 100%; padding: 16px 20px; margin-bottom: 12px;
            background: white; border: 1px solid var(--muji-border); border-radius: 2px;
            font-size: 0.95rem; cursor: pointer; transition: all 0.2s; text-align: left;
            box-sizing: border-box;
        }
        .option-btn:hover { background-color: var(--muji-light-gray); border-color: #999; }
        .option-btn strong { display: block; font-size: 1rem; color: #000; margin-bottom: 4px; }

        .back-btn {
            display: inline-block; margin-top: 15px; background: none; border: none;
            color: #999; text-decoration: underline; font-size: 0.85rem; cursor: pointer;
        }

        .result-card { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .result-item {
            display: flex; align-items: center; background-color: var(--muji-light-gray);
            padding: 15px; border-radius: 4px; text-align: left;
        }
        .result-img { width: 85px; height: 85px; background-color: #fff; margin-right: 15px; border-radius: 2px; object-fit: contain; flex-shrink: 0; border: 1px solid #eee; }
        .product-name { font-size: 0.95rem; font-weight: 500; color: #000; line-height: 1.4; }
        .label { display: block; font-size: 0.7rem; color: var(--muji-red); font-weight: bold; margin-bottom: 4px; }
        
        .restart-btn { margin-top: 30px; background: none; border: none; text-decoration: underline; color: #999; cursor: pointer; font-size: 0.9rem; }

        @media (min-width: 600px) {
            .hero-img { max-height: 300px; }
        }
    </style>
</head>
<body>

<div id="yt-player"></div>

<div id="quiz-container">
    <div id="step-0" class="step active">
        <img src="https://img.91app.com/webapi/imagesV3/Original/SalePage/11567044/5/639087467223230000" class="hero-img" alt="MUJI Scalp Care">
        <h1>尋找您的專屬頭皮護理方式</h1>
        <p class="description">
            源自肌膚保養概念，特別添加<br>
            <strong>米糠、薏仁、大麥</strong> 三大發酵液成分。<br>
            賦予頭皮潤澤，深層修補受損。<br>
            只需三步驟，發現您的完美養護對策。
        </p>
        <button class="option-btn" style="text-align:center; background:var(--muji-gray); color:white;" onclick="startQuiz()">開始檢測</button>
    </div>

    <div id="step-result" class="step">
        <h1>您的專屬護理組合</h1>
        <div class="result-card">
            <div class="result-item"><img id="img-res-1" class="result-img" src=""><div class="result-info"><span class="label">Step 1. 核心基礎保養</span><span class="product-name" id="res-1"></span></div></div>
            <div class="result-item"><img id="img-res-2" class="result-img" src=""><div class="result-info"><span class="label">Step 2. 機能進階對策</span><span class="product-name" id="res-2"></span></div></div>
        </div>
        <button class="restart-btn" onclick="resetQuiz()">重新檢測</button>
    </div>
</div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0',
            videoId: '2Lr11mJWrsE',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': '2Lr11mJWrsE', 'controls': 0 }
        });
    }

    function startQuiz() {
        if (player && player.playVideo) { player.playVideo(); }
        nextStep(1);
    }

    function resetQuiz() {
        selections = {};
        nextStep(0); // 回首頁，不重整網頁，音樂繼續播
    }

    // (中間的 nextStep, record, showResult 邏輯與圖片路徑保持不變)
</script>
</body>
</html>
